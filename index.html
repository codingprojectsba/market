<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Prediction Market</h1>
    <p>Predict which topics will appear on the exam using probability.</p>
</header>

<section>
    <h2>How it works</h2>
    <p>
        Users assign probabilities to exam topics. The system aggregates predictions
        using a reputation-weighted model.
    </p>
</section>

<section>
    <h2>Topics (Contracts)</h2>
    <div id="topics"></div>

    <h3>Add New Topic</h3>
    <input type="text" id="newTopic" placeholder="Enter topic name" style="margin-top:10px;">
    <button onclick="addTopic()" style="margin-left:10px;">Add Topic</button>
</section>

<section>
    <h2>Your Prediction</h2>
    <label>Topic:</label>
    <select id="topicSelect"></select>

    <label>Probability (0–1):</label>
    <input type="number" id="probInput" step="0.01" min="0" max="1">

    <label>Stake:</label>
    <input type="number" id="stakeInput" value="10">

    <button onclick="submitPrediction()">Submit</button>
    <button onclick="resetMarket()">Reset Market</button>
</section>

<section>
    <h2>Market Probabilities</h2>
    <div id="market"></div>
</section>

<script src="script.js"></script>
</body>
</html>
